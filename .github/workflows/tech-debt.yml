name: Tech Debt Prevention

# Runs on every push to master and every PR. Each job is independent and
# parallel — failure in one doesn't block the others, so we get the full
# picture of every problem in a single run.
#
# What each job catches:
#   lint              biome — style + safe-fix lint rules
#   type-check        astro check — strict TypeScript across .astro/.tsx/.ts
#   build             astro build — full production build sanity check
#   dead-code         knip — unused files, exports, dependencies
#   unused-assets     scripts/find-unused-assets.mjs — orphan media in public/
#   media-validation  scripts/validate-media.mjs — corrupt files, missing refs
#   image-budget      scripts/image-budget.mjs — files over size budget
#   security-audit    pnpm audit — known npm vulnerabilities
#   secret-scan       gitleaks — committed secrets / API keys
#   lint:emdash       custom check — em-dash characters in prose
#
# Cirun: the `build` job routes through a Cirun-managed runner (see .cirun.yml).
# Until you install the Cirun GitHub App + add cloud credentials at
# https://cirun.io, that one job will hang in queue. Other jobs are
# unaffected. To disable Cirun until then, set `runs-on: ubuntu-latest` on
# the build job.

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Reusable env so all jobs land on the same toolchain version.
env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10'

jobs:
  # ─── Code-quality lane ─────────────────────────────────────────────────────

  lint:
    name: Lint (biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm lint:emdash

  type-check:
    name: Type Check (astro check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check

  build:
    name: Build (astro)
    # Routes through Cirun (see .cirun.yml). The trailing run_id makes the
    # runner unique per workflow run — required by Cirun. Revert to
    # `ubuntu-latest` if Cirun isn't installed on the repo yet.
    runs-on: "cirun-small--${{ github.run_id }}"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  dead-code:
    name: Dead Code (knip)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run knip (report only — does not fail the build yet)
        run: pnpm dead-code --reporter compact || true

  # ─── Asset lane ────────────────────────────────────────────────────────────

  unused-assets:
    name: Unused Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm unused-assets

  media-validation:
    name: Media Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate-media

  image-budget:
    name: Image Size Budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: node scripts/image-budget.mjs

  # ─── Security lane ─────────────────────────────────────────────────────────

  security-audit:
    name: Security Audit (pnpm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit dependencies (high+ only — moderate is too noisy)
        run: pnpm audit --audit-level=high

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Aggregate ─────────────────────────────────────────────────────────────
  # A single job that depends on everything — easy "Required check" target
  # when configuring branch protection.

  required:
    name: Required Checks
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - lint
      - type-check
      - build
      - unused-assets
      - media-validation
      - image-budget
      - security-audit
      - secret-scan
    steps:
      - name: Verify upstream jobs
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "::error::One or more required checks failed"
            exit 1
          fi
          echo "All required checks passed."
